name: Whiskers Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Whiskers
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/catppuccin/whiskers/releases/latest/download/whiskers-x86_64-unknown-linux-gnu -o "$HOME/.local/bin/whiskers"
          chmod +x "$HOME/.local/bin/whiskers"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check flavor files are up to date
        run: whiskers templates/catppuccin-flavors.tera --check
